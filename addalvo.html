<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Sentinela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 10px 16px; outline: none; transition: all 0.2s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .btn-primary { background: #2563eb; color: white; font-weight: 800; border-radius: 12px; padding: 12px 24px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .tab-btn { padding: 10px 20px; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 12px; transition: all 0.2s; color: #64748b; }
        .tab-btn.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10 antialiased">
    <div class="max-w-6xl mx-auto space-y-10">
        <!-- HEADER -->
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-800 text-white uppercase tracking-tight">Sentinela <span class="text-blue-500">Admin</span></h1>
                <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em] mt-1">Gest&atilde;o de Alvos e Curadoria de Dados</p>
            </div>
            <a href="/" class="text-[10px] font-black text-slate-500 hover:text-white uppercase tracking-widest transition-colors flex items-center gap-2">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
            </a>
        </header>

        <!-- NAVEGAÇÃO DE ABAS -->
        <div class="flex gap-2 border-b border-white/5 pb-4">
            <button onclick="switchTab('targets')" id="tab-targets" class="tab-btn active">Gest&atilde;o de Alvos</button>
            <button onclick="switchTab('review')" id="tab-review" class="tab-btn">Refino Pericial</button>
        </div>

        <!-- ABA 1: GESTÃO DE ALVOS -->
        <section id="content-targets" class="space-y-8">
            <div class="glass-card p-8">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Novo Monitorado</h2>
                <form id="add-target-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="username" placeholder="Username Instagram (ex: lulaoficial)" class="input-dark">
                    <input type="text" id="estado" placeholder="UF (ex: RN, SP ou BR)" class="input-dark">
                    <button type="submit" class="btn-primary">Ativar Monitoramento</button>
                </form>
            </div>
            <div id="targets-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Listagem de alvos injetada via JS -->
            </div>
        </section>

        <!-- ABA 2: CURADORIA PERICIAL -->
        <section id="content-review" class="hidden space-y-8">
            <div class="glass-card p-8">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                    <div>
                        <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Revis&atilde;o de Intelig&ecirc;ncia</h2>
                        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1">Identifica&ccedil;&atilde;o de Falsos Positivos e Negativos</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadReview('all')" class="px-4 py-2 bg-white/5 text-[9px] font-black uppercase rounded-lg border border-white/5 hover:bg-white/10 transition-all">Todos</button>
                        <button onclick="loadReview('hate')" class="px-4 py-2 bg-rose-500/10 text-rose-500 text-[9px] font-black uppercase rounded-lg border border-rose-500/20 hover:bg-rose-500/20 transition-all">Hate (Positivos)</button>
                        <button onclick="loadReview('neutral')" class="px-4 py-2 bg-emerald-500/10 text-emerald-500 text-[9px] font-black uppercase rounded-lg border border-emerald-500/20 hover:bg-emerald-500/20 transition-all">Neutro (Negativos)</button>
                    </div>
                </div>

                <div id="review-list" class="space-y-4">
                    <p class="text-center py-20 text-[10px] text-slate-600 font-black uppercase animate-pulse">Carregando evid&ecirc;ncias...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Lógica de Navegação
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.getElementById('content-targets').classList.add('hidden');
            document.getElementById('content-review').classList.add('hidden');
            document.getElementById(`content-${tab}`).classList.remove('hidden');

            if(tab === 'review') loadReview('all');
        }

        // Lógica de Curadoria (Review)
        async function loadReview(filter) {
            const container = document.getElementById('review-list');
            container.innerHTML = '<p class="text-center py-20 text-[10px] text-slate-600 font-black uppercase animate-pulse">Sincronizando com Supabase...</p>';
            
            let url = '/api/v1/admin/comments/review?limit=30';
            if(filter === 'hate') url += '&is_hate=true';
            if(filter === 'neutral') url += '&is_hate=false';

            const res = await fetch(url);
            const data = await res.json();

            if(!data.length) {
                container.innerHTML = '<p class="text-center py-20 text-[10px] text-slate-600 font-black uppercase">Nenhuma evid&ecirc;ncia para revisar.</p>';
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="p-6 bg-white/[0.02] border border-white/5 rounded-2xl flex flex-col md:flex-row justify-between gap-6 transition-all hover:bg-white/[0.04]">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="text-[9px] font-black text-blue-400 uppercase">@${c.candidato_id}</span>
                            <span class="px-2 py-0.5 bg-white/5 text-[8px] font-bold text-slate-600 rounded uppercase">${c.categoria_ia || 'SEM CAT'}</span>
                            <span class="text-[8px] font-bold text-slate-700 uppercase">${new Date(c.data_coleta).toLocaleString('pt-BR')}</span>
                        </div>
                        <p class="text-[11px] text-slate-300 italic leading-relaxed">"${c.texto_bruto}"</p>
                        <p class="text-[9px] text-slate-600 mt-2 font-medium">Justificativa IA: ${c.justificativa || 'Nenhuma'}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        ${c.is_hate 
                            ? `<button onclick="updateStatus(${c.id}, false)" class="px-4 py-2 bg-emerald-500/10 text-emerald-500 text-[9px] font-black uppercase rounded-xl border border-emerald-500/20 hover:bg-emerald-500 hover:text-white transition-all">Falso Positivo (Tornar Neutro)</button>`
                            : `<button onclick="updateStatus(${c.id}, true)" class="px-4 py-2 bg-rose-500/10 text-rose-500 text-[9px] font-black uppercase rounded-xl border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all">Falso Negativo (Tornar Ódio)</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(id, newHate) {
            const btn = event.target;
            btn.innerText = 'Sincronizando...';
            btn.disabled = true;

            const res = await fetch(`/api/v1/admin/comments/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_hate: newHate, categoria_ia: newHate ? 'CURADORIA_HUMANA' : 'NEUTRO_MANUAL' })
            });

            if(res.ok) {
                btn.closest('.p-6').style.opacity = '0.3';
                btn.closest('.p-6').style.pointerEvents = 'none';
            }
        }

        // Inicializar ícones
        lucide.createIcons();
    </script>
</body>
</html>
