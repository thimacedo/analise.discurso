<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINELA | Radiografia</title>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        .chart-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 3s ease-out forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="p-6 md:p-20 antialiased">
    <div class="max-w-6xl mx-auto space-y-16">
        <nav class="mb-12">
            <a href="/" class="text-blue-400 font-black text-[10px] uppercase tracking-[0.3em]">&larr; Dashboard Principal</a>
        </nav>
        <header class="space-y-6">
            <h1 class="text-4xl md:text-6xl font-800 text-white uppercase tracking-tighter">Radiografia do Extremismo</h1>
            <p class="text-slate-400 text-lg max-w-3xl font-medium">Monitoramento estrutural da violência política no Brasil (2024-2026).</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-8 border-l-4 border-l-red-600">
                <span class="text-[10px] text-slate-500 font-black uppercase mb-4 block tracking-widest">Aceleração</span>
                <div class="text-3xl font-black font-mono">1 a cada 1h30</div>
            </div>
            <div class="glass-card p-8 border-l-4 border-l-blue-600">
                <span class="text-[10px] text-slate-500 font-black uppercase mb-4 block tracking-widest">Xenofobia</span>
                <div class="text-3xl font-black font-mono">+874%</div>
            </div>
            <div class="glass-card p-8 border-l-4 border-l-amber-500">
                <span class="text-[10px] text-slate-500 font-black uppercase mb-4 block tracking-widest">Letalidade Racial</span>
                <div class="text-3xl font-black font-mono">80%</div>
            </div>
        </section>

        <section class="glass-card p-10 relative overflow-hidden">
            <h3 class="text-sm font-bold mb-10 uppercase tracking-widest">Curva de Vítimas por Dia</h3>
            <svg viewBox="0 0 400 150" class="w-full h-64 overflow-visible">
                <path d="M 0 145 Q 100 140, 200 120 T 400 10" fill="none" stroke="#f43f5e" stroke-width="4" stroke-linecap="round" class="chart-line" />
                <circle cx="400" cy="10" r="4" fill="#f43f5e" class="animate-pulse" />
            </svg>
        </section>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
