<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centro de Comando - Sentinela</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-8 font-sans">
    <h1 class="text-3xl font-bold text-blue-400 mb-6 flex items-center">📡 Radar de Workers</h1>
    
    <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 shadow-lg">
            <h2 class="text-sm text-slate-400 uppercase">Total Raspado</h2>
            <p id="stat-total" class="text-4xl font-mono text-white mt-2">0</p>
        </div>
        <div class="bg-slate-800 p-6 rounded-lg border border-red-900/50 shadow-lg">
            <h2 class="text-sm text-red-400 uppercase">Fila da IA (Pendentes)</h2>
            <p id="stat-pendentes" class="text-4xl font-mono text-red-500 mt-2">0</p>
        </div>
        <div class="bg-slate-800 p-6 rounded-lg border border-emerald-900/50 shadow-lg">
            <h2 class="text-sm text-emerald-400 uppercase">Processados</h2>
            <p id="stat-processados" class="text-4xl font-mono text-emerald-500 mt-2">0</p>
        </div>
    </div>

    <div class="bg-black p-4 rounded-lg border border-slate-700 shadow-2xl h-96 overflow-y-auto">
        <h2 class="text-xs text-slate-500 mb-2 font-mono uppercase tracking-widest border-b border-slate-800 pb-2">Terminal // worker.log</h2>
        <pre id="terminal-logs" class="text-emerald-400 font-mono text-sm whitespace-pre-wrap"></pre>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/monitor/status');
                const data = await res.json();
                document.getElementById('stat-total').innerText = data.total || 0;
                document.getElementById('stat-pendentes').innerText = data.pendentes || 0;
                document.getElementById('stat-processados').innerText = data.processados || 0;
                
                const terminal = document.getElementById('terminal-logs');
                // Ensure logs are displayed correctly, join with newline for multiline logs
                terminal.innerHTML = data.logs ? data.logs.join('
') : 'Aguardando logs...';
                terminal.parentElement.scrollTop = terminal.parentElement.scrollHeight;
            } catch (e) {
                console.error("Erro ao buscar status:", e); // Log error to browser console
                document.getElementById('terminal-logs').innerText = 'Erro ao conectar com a API: ' + e.message;
            }
        }
        setInterval(fetchStatus, 3000); // Atualiza a cada 3 segundos
        fetchStatus();
    </script>
</body>
</html>
