<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='UTF-8'>
    <title>Sentinela Intelligence Center</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
</head>
<body class='bg-slate-950 text-white p-8'>
    <header class='mb-10 text-center'>
        <h1 class='text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500'>Sentinela Intelligence Center</h1>
        <p class='text-slate-400'>Monitoramento Pericial de Narrativas</p>
    </header>

    <div id='profiles-container' class='grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10'>
        <!-- Cards serão injetados aqui via JS -->
    </div>

    <div class='grid grid-cols-1 lg:grid-cols-2 gap-8'>
        <div class='bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl'>
            <canvas id='chartRadar'></canvas>
        </div>
        <div class='bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl'>
            <canvas id='chartTime'></canvas>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vhamejkldzxbeibqeqpk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoYW1lamtsZHp4YmVpYnFlcXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgxMjUsImV4cCI6MjA5MjA2NDEyNX0.RMpgx8mDRrYRNfJ_GdOrsT5o8NkJiwBgW_J7CXSznWk';
        const headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

        async function init() {
            // Fetch de perfis (monitorados)
            const monitoradosRes = await fetch(SUPABASE_URL + '/rest/v1/candidatos?select=*', { headers });
            const monitorados = await monitoradosRes.json();

            // Renderiza Cards
            const container = document.getElementById('profiles-container');
            monitorados.forEach(p => {
                container.innerHTML += \
                <div class='bg-slate-900 p-4 rounded-xl border border-slate-700 flex flex-col items-center hover:border-blue-500 transition'>
                    <img src='\' class='w-20 h-20 rounded-full mb-3 border-2 border-slate-700'>
                    <h3 class='font-bold text-lg'>@\</h3>
                    <span class='text-xs text-slate-500 uppercase'>\</span>
                </div>\;
            });

            // Fetch Analytics (agregado)
            const resRadar = await fetch(SUPABASE_URL + '/rest/v1/view_radar_polarizacao', { headers });
            const radarData = await resRadar.json();

            new Chart(document.getElementById('chartRadar'), {
                type: 'radar',
                data: {
                    labels: radarData.map(d => d.candidato_id),
                    datasets: [{ label: 'Agressividade (%)', data: radarData.map(d => d.indice_agressividade), backgroundColor: 'rgba(239, 68, 68, 0.2)' }]
                }
            });
        }
        init();
    </script>
</body>
</html>
