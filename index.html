<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sentinela Democrática - Monitoramento estratégico de discurso de ódio e tendências políticas no Brasil com inteligência forense.">
    <!-- Google Tools -->
    <meta name="google-site-verification" content="ALWjqhKFnwzKBPGcQPsygASHuoRaJmrXxhuCuxCorgI" />
    <meta name="google-adsense-account" content="ca-pub-1827611269042960">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1827611269042960" crossorigin="anonymous"></script>
    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1899XV142N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1899XV142N');
    </script>
    
    <!-- Performance Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://d3js.org">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <title>SENTINELA | Diamond Edition v20.5.0</title>
    <link rel="icon" type="image/png" href="./assets/sentinela_small.png">
    
    <!-- Critical Scripts -->
    <script src="https://cdn.tailwindcss.com" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="stylesheet" href="./src/styles/main.css?v=20.5.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="custom-scrollbar">
    <!-- SIDEBAR ESQUERDA (Navegação) -->
    <aside class="sidebar-left">
        <div class="brand-block">
            <div class="brand-mark"><img src="./assets/sentinela_small.webp" alt="Logo" fetchpriority="high"></div>
            <h1>Sentinela</h1>
        </div>

        <nav class="side-nav">
            <a href="#monitor" class="nav-item active" id="nav-monitor"><i data-lucide="home" class="w-5 h-5"></i> <span>Panorama</span></a>
            <a href="#networks" class="nav-item" id="nav-networks"><i data-lucide="share-2" class="w-5 h-5"></i> <span>Redes</span></a>
            <a href="#directory" class="nav-item" id="nav-directory"><i data-lucide="users" class="w-5 h-5"></i> <span>Perfis</span></a>
            <a href="#dossie" class="nav-item" id="nav-dossie"><i data-lucide="fingerprint" class="w-5 h-5"></i> <span>Dossiês</span></a>
            <a href="#map" class="nav-item" id="nav-map"><i data-lucide="globe" class="w-5 h-5"></i> <span>Mapa</span></a>
            
            <div class="mt-8 pt-6 border-t border-slate-200">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-3 block">Filtros de Inteligência</span>
                <button onclick="window.setDashboardFilter('all')" id="btn-filter-all" class="nav-item"><i data-lucide="globe" class="w-5 h-5"></i> <span>Global</span></button>
                <button onclick="window.setDashboardFilter('hate')" id="btn-filter-hate" class="nav-item"><i data-lucide="shield-alert" class="w-5 h-5"></i> <span>Alertas</span></button>
                <button onclick="window.setDashboardFilter('critical')" id="btn-filter-critical" class="nav-item"><i data-lucide="alert-octagon" class="w-5 h-5"></i> <span>Crítico</span></button>
            </div>
        </nav>

        <div class="sidebar-footer">
        </div>
    </aside>

    <!-- FEED CENTRAL -->
    <main class="main-feed-container custom-scrollbar dashboard-main">
        <header class="feed-header">
            <div class="search-box">
                <i data-lucide="search" class="search-icon w-4 h-4"></i>
                <input type="text" placeholder="Pesquisar inteligência..." oninput="window.setDashboardSearch(this.value)">
            </div>
        </header>

        <div class="views-container">
            <section id="view-monitor" class="view-content active-view">
                <div id="feed-alertas" class="social-feed">
                    <!-- Cards de Alerta aqui -->
                </div>
                
                <div id="scroll-sentinel" style="height: 10px; width: 100%;"></div>
                
                <div id="loading-spinner" class="loading-state" style="display: none;">
                    <div class="spinner"></div> <span class="text-[10px] font-bold text-slate-400">CARREGANDO...</span>
                </div>
            </section>

            <section id="view-networks" class="view-content"></section>
            <section id="view-directory" class="view-content"></section>
            <section id="view-dossie" class="view-content"></section>
            <section id="view-map" class="view-content"></section>
        </div>
    </main>

    <!-- SIDEBAR DIREITA (Inteligência Fixa) -->
    <aside class="sidebar-right custom-scrollbar">
        <div class="profile-summary mb-8">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                <img src="/assets/sentinela_small.webp" alt="Logo" class="w-6 h-6" fetchpriority="high">
            </div>
            <div>
                <h2 class="text-sm font-black text-slate-800">Sentinela Diamond</h2>
                <span class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter" id="stn-balance">0 STN</span>
            </div>
        </div>

        <div class="kpi-grid-vertical flex flex-col gap-3 mb-8">
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-slate-200 rounded-xl">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Alvos</span>
                <div id="kpi-monitorados" class="text-sm font-black text-slate-800">---</div>
            </div>
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-slate-200 rounded-xl">
                <span class="text-[10px] font-bold text-slate-400 uppercase text-red-500">Alertas</span>
                <div id="kpi-hate" class="text-sm font-black text-red-600">---</div>
            </div>
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-slate-200 rounded-xl">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Amostra</span>
                <div id="kpi-total" class="text-sm font-black text-slate-800">---</div>
            </div>
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-slate-200 rounded-xl">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Resiliência</span>
                <div id="kpi-res" class="text-sm font-black text-green-600">---</div>
            </div>
        </div>

        <div class="insight-card p-4 bg-white border border-slate-200 rounded-xl">
            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Prioridade de Triagem</h3>
            <div id="chartMain" class="flex flex-col gap-2">
                <!-- Lista de Risco aqui -->
            </div>
        </div>
    </aside>

    <!-- Scripts de Terceiros e Core -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script type="module" src="./src/core/app.js?v=20.5.0"></script>
    <script type="module" src="./src/core/payments.js?v=20.5.0"></script>
</body>
</html>
