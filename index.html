<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINELA | Inteligência Situacional v10.4</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --glass: rgba(15, 23, 42, 0.95); --border: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; height: 100vh; overflow: hidden; }
        .glass-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }
        .nav-item { display: flex; align-items: center; gap: 0.8rem; width: 100%; padding: 0.9rem 1.3rem; border-radius: 14px; font-weight: 700; font-size: 0.8rem; color: #64748b; transition: 0.3s; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .profile-thumb { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; background: #1e293b; border: 2px solid rgba(255,255,255,0.05); }
        .state { fill: #1e293b; stroke: #334155; stroke-width: 0.5; transition: 0.3s; cursor: pointer; }
        .state:hover { fill: #3b82f6; stroke: #fff; }
        .state.active { fill: rgba(59, 130, 246, 0.4); stroke: #60a5fa; }
        .state.danger { fill: rgba(245, 158, 11, 0.5) !important; stroke: #f59e0b; }
        .spectrum-bar { height: 6px; border-radius: 4px; display: flex; overflow: hidden; background: rgba(255,255,255,0.05); }
        .seg-neutro { background: #3b82f6; } .seg-ataque { background: #ef4444; }
        .chart-box { height: 280px; position: relative; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="antialiased flex p-4 gap-4">

    <aside class="w-72 glass-card flex flex-col p-8 shrink-0">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i data-lucide="shield" class="w-6 h-6 text-white"></i></div>
            <h1 class="text-lg font-900 tracking-tighter">SENTINELA</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="navigate('monitor')" id="nav-monitor" class="nav-item"><i data-lucide="bar-chart-3" class="w-4 h-4"></i> Dashboard</button>
            <button onclick="navigate('dossie')" id="nav-dossie" class="nav-item"><i data-lucide="user-search" class="w-4 h-4"></i> Dossiê Alvos</button>
            <button onclick="navigate('map')" id="nav-map" class="nav-item"><i data-lucide="map" class="w-4 h-4"></i> Geopolítica</button>
        </nav>
        <button onclick="refresh()" class="mt-auto w-full py-4 bg-white/5 hover:bg-blue-600 transition-all rounded-2xl text-[10px] font-black tracking-widest">SINCRONIZAR</button>
    </aside>

    <main class="flex-1 flex flex-col gap-4 min-w-0">
        <header class="grid grid-cols-4 gap-4 shrink-0">
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-slate-500 font-bold block mb-1 uppercase">Monitorados</span><div id="kpi-alvos" class="text-2xl font-black font-mono">---</div></div>
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-amber-500 font-bold block mb-1 uppercase">Alertas</span><div id="kpi-hate" class="text-2xl font-black font-mono text-amber-500">---</div></div>
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-blue-400 font-bold block mb-1 uppercase">Volume</span><div id="kpi-total" class="text-2xl font-black font-mono text-blue-400">---</div></div>
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-slate-400 font-bold block mb-1 uppercase">Resiliência</span><div id="kpi-res" class="text-2xl font-black font-mono">---</div></div>
        </header>

        <div class="flex-1 glass-card relative">
            <div id="view-monitor" class="view-content absolute inset-0 p-8 flex flex-col hidden">
                <div class="grid grid-cols-3 gap-6 flex-1 h-full">
                    <div class="col-span-2 glass-card p-8 bg-slate-900/20 flex flex-col">
                        <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-8">Evolução do Clima (Interações x Risco)</h3>
                        <div class="chart-box"><canvas id="chartMain"></canvas></div>
                    </div>
                    <div class="flex flex-col gap-4">
                        <div class="glass-card p-6 flex-1"><h3 class="text-[9px] font-bold text-blue-400 uppercase mb-4">Top Nacional</h3><div id="rank-nac" class="space-y-4"></div></div>
                        <div class="glass-card p-6 flex-1"><h3 class="text-[9px] font-bold text-amber-400 uppercase mb-4">Top Regional</h3><div id="rank-reg" class="space-y-4"></div></div>
                    </div>
                </div>
            </div>

            <div id="view-dossie" class="view-content absolute inset-0 p-8 overflow-y-auto hidden">
                <h2 class="text-xl font-900 mb-8 tracking-tighter uppercase">Dossiê Situacional</h2>
                <div id="dossie-grid" class="grid grid-cols-3 gap-6"></div>
            </div>

            <div id="view-map" class="view-content absolute inset-0 p-8 flex flex-col hidden">
                <div class="flex-1 flex gap-8 items-center">
                    <div class="flex-1 h-full flex justify-center py-4"><svg id="svg-map-br" viewBox="0 0 500 500" class="h-full w-auto drop-shadow-2xl"></svg></div>
                    <div class="w-80 glass-card p-8 bg-slate-900/60 border-l-4 border-l-blue-600">
                        <h3 id="st-name" class="text-2xl font-black mb-1">Brasil</h3>
                        <div class="grid grid-cols-2 gap-4 mt-6">
                            <div class="p-4 bg-white/5 rounded-2xl"><span class="text-[8px] text-slate-500 uppercase block mb-1">Alvos</span><div id="st-targets" class="text-xl font-black">0</div></div>
                            <div class="p-4 bg-white/5 rounded-2xl"><span class="text-[8px] text-slate-500 uppercase block mb-1">Alertas</span><div id="st-hate" class="text-xl font-black text-amber-500">0</div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const SB_URL = "https://vhamejkldzxbeibqeqpk.supabase.co/rest/v1";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoYW1lamtsZHp4YmVpYnFlcXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgxMjUsImV4cCI6MjA5MjA2NDEyNX0.RMpgx8mDRrYRNfJ_GdOrsT5o8NkJiwBgW_J7CXSznWk";
        const h = { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` };
        let mainChart = null;

        const statesPaths = { "AC": "M44.4 345.5l-3.3-4.5 13.9-10.4 12.8 5.7 7.7-10.8 13.4 3.7 3.5 15.5-2.2 4.2-12.7 10.9-13.6-0.3-19.5 6z", "AL": "M483.4 330.4l-4.2-4.1-1.2-13.5 15.8-2 6.7 10 1.2 12.2z", "AM": "M43.7 215.1l73.4-39.6 44.8 28.1 48-18.7 18.2 24.5-12.4 46.1 19.1 57.6-67.4 33.9-13.4-3.7-7.7 10.8-12.8-5.7-13.9 10.4-35.9-46.7-5.9-47.5z", "AP": "M266.3 128.4l11.4 3.5 6.7 20.3-25.1 19.3-13.9-10.8z", "BA": "M386.4 290l17.4-44.1 27.6 24.1 17 64-16.1 50-68.5 0.5-54.8-19.1-17.5-68.4z", "CE": "M431.2 216.5l33.9 13.2 0.7 34.6-26.6-11.7-8z", "DF": "M316 357h10v10h-10z", "ES": "M426 430l10.5-18.6 6 2.5 1.5 35.8-10.5 4z", "GO": "M278.4 353l37.1-13 32.5 13.5 17.5 68.4-40.4 5.9-40.7-36.9z", "MA": "M315.6 182l49.5 28.5 21.3 80.5-44.1 24.9-32.5-33.1z", "MG": "M331 430l40.4-5.9 54.6 5.8 14.5 45.4-33.5 54.4-76 6.3z", "MS": "M205 440l73.4 13.5 40.7 36.9-20.1 76-78.5-10.4z", "MT": "M160 300l67.4-33.9 51 18.9 32.5 33.1-37.1 13-73.4-13.5z", "PA": "M161.9 203.6l104.4-75.2 26 15 23.3 38.6-49.5 28.5-51-18.9z", "PB": "M465 240l18.4 10.5 0.1 14.5-18.5 0.5z", "PE": "M420 250l45 10 0.5 30-45.5-2z", "PI": "M365 210l30.4 6 35.8 74-27.6-24.1z", "PR": "M210 520l78.5 10.4 1.5 35.8-60 15.8z", "RJ": "M380 535l40.5-15 4.5 15.5-35 15z", "RN": "M450 210l33.4 6.5-18.4 23.5-15-15z", "RO": "M130 320l73.4 13.5-3.5 15.5-60 15.8z", "RR": "M117 175.5l44.9-25.5 10.5 18.6 13.9 10.8-44.8 28.1z", "RS": "M210 560l60-15.8 4.5 35.8-64.5 15z", "SC": "M220 545l60-15.8 10.5 15-70.5 15z", "SE": "M470 310l13.4 20.4-15.8 2z", "SP": "M300 520l33.5-54.4 76-6.3-4.5 35.8-70 25z", "TO": "M300 240l54.8 19.1 12.5 73.5-44.1 24.9-23.2-117.5z" };
        const stats = {};

        function navigate(v) {
            window.location.hash = v;
            document.querySelectorAll('.view-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            document.getElementById(`nav-${v}`).classList.add('active');
            if(v === 'monitor') renderMainChart();
        }

        async function refresh() {
            try {
                const res = await fetch(`${SB_URL}/candidatos?select=*&order=comentarios_totais_count.desc`, { headers: h });
                const data = await res.json();
                
                let globTotal = 0, globHate = 0;
                Object.keys(statesPaths).forEach(uf => stats[uf] = { count: 0, hate: 0, total: 0 });

                data.forEach(c => {
                    const ti = c.comentarios_totais_count || 0;
                    const th = c.comentarios_odio_count || 0;
                    globTotal += ti; globHate += th;
                    if(c.estado && stats[c.estado]) {
                        stats[c.estado].count++;
                        stats[c.estado].total += ti;
                        stats[c.estado].hate += th;
                    }
                });

                if(document.getElementById('kpi-alvos')) document.getElementById('kpi-alvos').innerText = data.length;
                if(document.getElementById('kpi-total')) document.getElementById('kpi-total').innerText = globTotal.toLocaleString();
                if(document.getElementById('kpi-hate')) document.getElementById('kpi-hate').innerText = globHate;
                if(document.getElementById('kpi-res')) document.getElementById('kpi-res').innerText = `${(100 - (globHate/globTotal*100 || 0)).toFixed(1)}%`;

                renderRankings(data);
                renderDossie(data);
                renderMap();
            } catch(e) { console.error("Refresh Error:", e); }
        }

        function renderRankings(data) {
            const nac = data.filter(i => !i.estado || i.estado === 'DF').slice(0, 4);
            const reg = data.filter(i => i.estado && i.estado !== 'DF').slice(0, 4);
            const draw = (list, id) => {
                document.getElementById(id).innerHTML = list.map(t => `
                    <div class="flex items-center gap-3">
                        <img src="https://unavatar.io/instagram/${t.username}" class="w-8 h-8 rounded-lg" onerror="this.src='https://ui-avatars.com/api/?name=${t.username}'">
                        <div class="flex-1"><div class="flex justify-between text-[9px] font-bold"><span>@${t.username}</span><span>${t.comentarios_totais_count}</span></div>
                        <div class="w-full h-1 bg-white/5 rounded-full mt-1"><div class="h-full bg-blue-600" style="width: ${t.comentarios_totais_count/(list[0].comentarios_totais_count||1)*100}%"></div></div></div>
                    </div>`).join('');
            };
            draw(nac, 'rank-nac'); draw(reg, 'rank-reg');
        }

        function renderDossie(data) {
            document.getElementById('dossie-grid').innerHTML = data.map(t => {
                const perc = t.comentarios_totais_count > 0 ? (100 - (t.comentarios_odio_count/t.comentarios_totais_count*100)) : 100;
                return `
                <div class="glass-card p-6 bg-white/[0.02] border-white/5">
                    <div class="flex justify-between items-start mb-6">
                        <img src="https://unavatar.io/instagram/${t.username}" class="profile-thumb" onerror="this.src='https://ui-avatars.com/api/?name=${t.username}'">
                        <span class="text-[8px] px-2 py-1 rounded bg-blue-500/10 text-blue-400 font-black uppercase">${t.estado || 'BR'}</span>
                    </div>
                    <h4 class="text-sm font-black mb-1">@${t.username}</h4>
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-4">${t.cargo || 'Monitorado'}</p>
                    <div class="spectrum-bar mb-2"><div class="spectrum-segment seg-neutro" style="width: ${perc}%"></div><div class="spectrum-segment seg-ataque" style="width: ${100-perc}%"></div></div>
                    <div class="flex justify-between text-[8px] font-bold"><span class="text-slate-500 uppercase">Resiliência</span><span class="text-blue-400">${perc.toFixed(1)}%</span></div>
                </div>`;
            }).join('');
        }

        function renderMap() {
            const svg = document.getElementById('svg-map-br');
            svg.innerHTML = Object.entries(statesPaths).map(([uf, d]) => {
                const info = stats[uf];
                let css = "state";
                if(info.total > 0) css += " has-data";
                if(info.hate > 0) css += " danger";
                return `<path id="state-${uf}" d="${d}" class="${css}" onclick="focusState('${uf}')"><title>${uf}</title></path>`;
            }).join('');
        }

        function focusState(uf) {
            document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
            document.getElementById(`state-${uf}`).classList.add('active');
            const info = stats[uf];
            document.getElementById('st-name').innerText = uf;
            document.getElementById('st-targets').innerText = info.count;
            document.getElementById('st-hate').innerText = info.hate;
        }

        function renderMainChart() {
            const ctx = document.getElementById('chartMain').getContext('2d');
            if(mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['17/04','18/04','19/04','20/04','21/04','22/04','23/04'], 
                datasets: [
                    { label: 'Vol', data: [150, 220, 180, 290, 310, 240, 380], borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.02)', pointRadius: 0 },
                    { label: 'Risco', data: [10, 30, 15, 45, 20, 12, 25], borderColor: '#ef4444', tension: 0.4, borderDash: [5,5], pointRadius: 0 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { display: false } }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 8 } } } } }
            });
        }

        window.onload = () => { navigate(window.location.hash.substring(1) || 'monitor'); refresh(); };
    </script>
</body>
</html>
