    <meta name="google-adsense-account" content="ca-pub-1827611269042960">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://d3js.org">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <script src="https://cdn.tailwindcss.com"></script>
    <title>SENTINELA | Diamond Edition v20.5.2</title>
    <link rel="icon" type="image/png" href="./assets/sentinela_small.png">
    
    <!-- Critical Scripts -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

</head>
<body class="custom-scrollbar">
    <!-- SIDEBAR ESQUERDA (Navegação) -->
    <aside class="sidebar-left">
        <div class="brand-block">
                <div class="brand-mark"><img src="./assets/sentinela_small.webp" alt="Logo" fetchpriority="high"></div>
        </div>

        <nav class="side-nav">
            <div class="search-box-sidebar px-3 mb-6">
                <div class="relative flex items-center group">
                    <i data-lucide="search" class="absolute left-3 w-4 h-4 text-slate-400"></i>
                    <input type="text" 
                           id="dashboard-search-input"
                           placeholder="Pesquisar..." 
                           class="w-full bg-slate-100 border-none rounded-lg py-2 pl-10 pr-8 text-xs focus:ring-2 focus:ring-blue-500 transition-all"
                           oninput="window.setDashboardSearch(this.value)">
                    <button onclick="window.clearDashboardSearch()" id="clear-search-btn" class="absolute right-3 w-4 h-4 text-slate-400 hover:text-slate-600 hidden group-hover:block transition-colors">
                        <i data-lucide="x" class="w-full h-full"></i>
                    </button>
                </div>
            </div>

            <a href="#monitor" class="nav-item active" id="nav-monitor"><i data-lucide="home" class="w-5 h-5"></i> <span>Panorama</span></a>
            <a href="#networks" class="nav-item" id="nav-networks"><i data-lucide="share-2" class="w-5 h-5"></i> <span>Redes</span></a>
            <a href="#directory" class="nav-item" id="nav-directory"><i data-lucide="users" class="w-5 h-5"></i> <span>Perfis</span></a>
            <a href="#dossie" class="nav-item" id="nav-dossie"><i data-lucide="fingerprint" class="w-5 h-5"></i> <span>Relatórios</span></a>
            <a href="#ads" class="nav-item" id="nav-ads"><i data-lucide="megaphone" class="w-5 h-5"></i> <span>Anúncios</span></a>
            <a href="#map" class="nav-item" id="nav-map"><i data-lucide="globe" class="w-5 h-5"></i> <span>Mapa</span></a>
            <a href="#workers" class="nav-item" id="nav-workers"><i data-lucide="activity" class="w-5 h-5"></i> <span>Workers</span></a>
            
            <div class="mt-8 pt-6 border-t border-slate-200">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-3 block">Filtros de Inteligência</span>
                <button onclick="window.setDashboardFilter('all')" id="btn-filter-all" class="nav-item"><i data-lucide="globe" class="w-5 h-5"></i> <span>Global</span></button>
                <button onclick="window.setDashboardFilter('hate')" id="btn-filter-hate" class="nav-item"><i data-lucide="shield-alert" class="w-5 h-5"></i> <span>Alertas</span></button>
                <button onclick="window.setDashboardFilter('critical')" id="btn-filter-critical" class="nav-item"><i data-lucide="alert-octagon" class="w-5 h-5"></i> <span>Crítico</span></button>
            </div>
        </nav>

        <div class="sidebar-footer">
        </div>
    </aside>

    <!-- FEED CENTRAL -->
    <main class="main-feed-container custom-scrollbar dashboard-main">
        <div class="views-container">
            <section id="view-monitor" class="view-content active-view">
                <div id="feed-alertas" class="social-feed">
                    <!-- Cards de Alerta aqui -->
                </div>
                
                <div id="scroll-sentinel" style="height: 10px; width: 100%;"></div>
                
                <div id="loading-spinner" class="loading-state" style="display: none;">
                    <div class="spinner"></div> <span class="text-[10px] font-bold text-slate-400">CARREGANDO...</span>
                </div>
            </section>

            <section id="view-networks" class="view-content"></section>
            <section id="view-directory" class="view-content"></section>
            <section id="view-dossie" class="view-content"></section>
            <section id="view-ads" class="view-content"></section>
            <section id="view-map" class="view-content"></section>
            <section id="view-workers" class="view-content"></section>
        </div>
    </main>

    <!-- SIDEBAR DIREITA (Inteligência Fixa) -->
    <aside class="sidebar-right custom-scrollbar">
        <div class="profile-summary mb-8">
            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                <img src="./assets/sentinela_small.webp" alt="Logo" class="w-6 h-6" fetchpriority="high">
            </div>
            <div>
                <h2 class="text-sm font-black text-slate-800">Sentinela Diamond</h2>
                <span class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter" id="stn-balance">0 STN</span>
            </div>
        </div>

        <div class="kpi-grid-vertical flex flex-col gap-3 mb-8">
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                <div class="flex items-center gap-3 relative z-10">
                    <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-blue-500">
                        <i data-lucide="users" class="w-4 h-4"></i>
                    </div>
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Alvos</span>
                </div>
                <div class="flex flex-col items-end relative z-10">
                    <div id="kpi-monitorados" class="text-base font-black text-slate-800">---</div>
                    <span class="text-[8px] font-bold text-slate-400 mt-0.5" id="kpi-time-monitorados">--:--</span>
                </div>
            </div>
            
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-red-100 rounded-xl shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-red-50/50 to-transparent"></div>
                <div class="flex items-center gap-3 relative z-10">
                    <div class="w-8 h-8 rounded-lg bg-red-50 flex items-center justify-center text-red-500">
                        <i data-lucide="shield-alert" class="w-4 h-4"></i>
                    </div>
                    <span class="text-[11px] font-bold text-red-600 uppercase tracking-wider">Alertas</span>
                </div>
                <div class="flex flex-col items-end relative z-10">
                    <div id="kpi-hate" class="text-base font-black text-red-600">---</div>
                    <span class="text-[8px] font-bold text-red-400/70 mt-0.5" id="kpi-time-hate">--:--</span>
                </div>
            </div>
            
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                <div class="flex items-center gap-3 relative z-10">
                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-slate-500">
                        <i data-lucide="database" class="w-4 h-4"></i>
                    </div>
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Amostra</span>
                </div>
                <div class="flex flex-col items-end relative z-10">
                    <div id="kpi-total" class="text-base font-black text-slate-800">---</div>
                    <span class="text-[8px] font-bold text-slate-400 mt-0.5" id="kpi-time-total">--:--</span>
                </div>
            </div>
            
            <div class="kpi-card flex justify-between items-center p-4 bg-white border border-green-100 rounded-xl shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-green-50/50 to-transparent"></div>
                <div class="flex items-center gap-3 relative z-10">
                    <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center text-green-500">
                        <i data-lucide="activity" class="w-4 h-4"></i>
                    </div>
                    <span class="text-[11px] font-bold text-green-600 uppercase tracking-wider">Resiliência</span>
                </div>
                <div class="flex flex-col items-end relative z-10">
                    <div id="kpi-res" class="text-base font-black text-green-600">---</div>
                    <span class="text-[8px] font-bold text-green-400/70 mt-0.5" id="kpi-time-res">--:--</span>
                </div>
            </div>
        </div>

        <div class="insight-card p-4 bg-white border border-slate-200 rounded-xl mb-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Publicidade Estratégica</h3>
            <div class="ad-sidebar-container bg-slate-50 rounded-lg flex items-center justify-center overflow-hidden border border-dashed border-slate-200" style="min-height: 250px;">
                <!-- ADSENSE SIDEBAR -->
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-1827611269042960"
                     data-ad-slot="2190167769"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(window.adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </div>

        <div class="insight-card p-4 bg-white border border-slate-200 rounded-xl">
            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Prioridade de Triagem</h3>
            <div id="chartMain" class="flex flex-col gap-2">
                <!-- Lista de Risco aqui -->
            </div>
        </div>
    </aside>

    <!-- Scripts de Terceiros e Core -->
    <script type="module" src="./src/core/app.js?v=20.5.6"></script>
    <script type="module" src="./src/core/payments.js?v=20.5.6"></script>
</body>
</html>
