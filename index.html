<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela Democrática - Hub Informativo</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1827611269042960" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #debug-console {
            width: 100%;
            max-height: 150px;
            background: #0f172a;
            color: #10b981;
            padding: 10px;
            font-family: monospace;
            overflow-y: auto;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            border: 1px solid #334155;
        }
        .ads-placeholder {
            background-color: #1e293b;
            border: 1px dashed #475569;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 90px;
            width: 100%;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 md:p-8 font-sans">
    
    <div class="ads-placeholder rounded-lg">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-1827611269042960"
             data-ad-slot="XXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <header class="mb-8 border-b border-slate-800 pb-4">
        <h1 class="text-3xl font-bold text-white">Sentinela Democrática</h1>
        <p class="text-slate-400">Hub de Inteligência e Tendências de Opinião Pública</p>
    </header>

    <div id="alerts-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"></div>

    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl mb-8">
        <h2 class="text-xl font-semibold mb-4 text-slate-300">Análise Qualitativa de Engajamento</h2>
        <div class="relative h-96 w-full">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div id="debug-console"></div>

    <script>
        const SUPABASE_URL = 'https://vhamejkldzxbeibqeqpk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoYW1lamtsZHp4YmVpYnFlcXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgxMjUsImV4cCI6MjA5MjA2NDEyNX0.RMpgx8mDRrYRNfJ_GdOrsT5o8NkJiwBgW_J7CXSznWk'; 

        function logDebug(msg, level = "INFO") {
            const consoleEl = document.getElementById('debug-console');
            const time = new Date().toLocaleTimeString();
            const logMsg = `[${time}] [${level}] ${msg}`;
            console.log(logMsg);
            
            const line = document.createElement('div');
            line.textContent = logMsg;
            if (level === "ERROR") line.style.color = "#ef4444";
            if (level === "WARN") line.style.color = "#f59e0b";
            
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function fetchSupabase(viewName) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${viewName}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} ao acessar ${viewName}`);
            return await res.json();
        }

        async function initDashboard() {
            logDebug("Iniciando carregamento do hub informativo...");
            try {
                const alertas = await fetchSupabase('vw_picos_engajamento');
                const alertsContainer = document.getElementById('alerts-container');
                
                if (alertas && alertas.length > 0) {
                    alertas.forEach(alerta => {
                        alertsContainer.innerHTML += `
                            <div class="bg-amber-900/20 border border-amber-500/50 p-4 rounded-lg">
                                <h3 class="text-amber-500 font-bold flex items-center gap-2">
                                    <span>⚠️ Pico de Engajamento Hostil</span>
                                </h3>
                                <p class="text-sm mt-1"><strong>Perfil:</strong> ${alerta.candidato_id}</p>
                                <p class="text-sm text-slate-400">Volume: ${alerta.volume_mensagens} mensagens</p>
                            </div>
                        `;
                    });
                } else {
                    alertsContainer.innerHTML = '<div class="col-span-full p-4 glass-panel text-center text-slate-500">Nenhum alerta crítico no momento.</div>';
                }

                const termometro = await fetchSupabase('vw_termometro_hostilidade');
                if (termometro && termometro.length > 0) {
                    const ctx = document.getElementById('trendChart');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: [...new Set(termometro.map(d => d.rotulo_ia))],
                            datasets: [{
                                label: 'Volume Global por Categoria',
                                data: termometro.reduce((acc, curr) => {
                                    const label = curr.rotulo_ia;
                                    const idx = acc.labels.indexOf(label);
                                    if(idx === -1) {
                                        acc.labels.push(label);
                                        acc.data.push(curr.volume_mensagens);
                                    } else {
                                        acc.data[idx] += curr.volume_mensagens;
                                    }
                                    return acc;
                                }, {labels: [], data: []}).data,
                                backgroundColor: 'rgba(59, 130, 246, 0.7)',
                                borderColor: 'rgb(59, 130, 246)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { labels: { color: '#cbd5e1' } } },
                            scales: {
                                y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#94a3b8' } },
                                x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#94a3b8' } }
                            }
                        }
                    });
                }

                logDebug("Dashboard renderizado com sucesso.");
            } catch (err) {
                logDebug(`Falha crítica: ${err.message}`, "ERROR");
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
