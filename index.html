<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINELA | Inteligência Situacional v11</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body class="antialiased flex p-4 gap-4">

    <!-- SIDEBAR -->
    <aside class="w-72 glass-card flex flex-col p-8 shrink-0">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><i data-lucide="shield" class="w-6 h-6 text-white"></i></div>
            <h1 class="text-lg font-900 tracking-tighter uppercase">Sentinela v11</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="navigate('monitor')" id="nav-monitor" class="nav-item"><i data-lucide="bar-chart-3" class="w-4 h-4"></i> Dashboard</button>
            <button onclick="navigate('dossie')" id="nav-dossie" class="nav-item"><i data-lucide="user-search" class="w-4 h-4"></i> Dossiê Alvos</button>
            <button onclick="navigate('map')" id="nav-map" class="nav-item"><i data-lucide="map" class="w-4 h-4"></i> Geopolítica</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col gap-4 min-w-0">
        <!-- HEADER KPIs -->
        <header class="grid grid-cols-4 gap-4 shrink-0">
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-slate-500 font-bold block mb-1 uppercase">ALVOS</span><div id="kpi-alvos" class="text-2xl font-black font-mono">---</div></div>
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-amber-500 font-bold block mb-1 uppercase">ALERTAS</span><div id="kpi-hate" class="text-2xl font-black font-mono text-amber-500">---</div></div>
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-blue-400 font-bold block mb-1 uppercase">VOLUME</span><div id="kpi-total" class="text-2xl font-black font-mono text-blue-400">---</div></div>
            <div class="glass-card p-6 text-center"><span class="text-[9px] text-slate-400 font-bold block mb-1 uppercase">RESILIÊNCIA</span><div id="kpi-res" class="text-2xl font-black font-mono">---</div></div>
        </header>

        <div class="flex-1 glass-card relative">
            <!-- DASHBOARD VIEW -->
            <div id="view-monitor" class="view-content absolute inset-0 p-8 flex flex-col hidden">
                <div class="grid grid-cols-3 gap-6 flex-1 h-full">
                    <div class="col-span-2 glass-card p-8 bg-slate-900/20 flex flex-col">
                        <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-8">Evolução Situacional</h3>
                        <div class="chart-box"><canvas id="chartMain"></canvas></div>
                    </div>
                    <div class="flex flex-col gap-4">
                        <div class="glass-card p-6 flex-1"><h3 class="text-[9px] font-bold text-blue-400 uppercase mb-4 text-center">Cenário Nacional</h3><div id="rank-nac" class="space-y-4"></div></div>
                        <div class="glass-card p-6 flex-1"><h3 class="text-[9px] font-bold text-amber-400 uppercase mb-4 text-center">Cenário Regional</h3><div id="rank-reg" class="space-y-4"></div></div>
                    </div>
                </div>
            </div>
            <!-- DOSSIE VIEW -->
            <div id="view-dossie" class="view-content absolute inset-0 p-8 overflow-y-auto hidden">
                <div id="dossie-grid" class="grid grid-cols-3 gap-6"></div>
            </div>
            <!-- MAP VIEW -->
            <div id="view-map" class="view-content absolute inset-0 p-8 flex flex-col hidden">
                <div class="flex-1 flex gap-8 items-center">
                    <div class="flex-1 h-full flex justify-center py-4"><svg id="svg-map-br" viewBox="0 0 500 500" class="h-full w-auto drop-shadow-2xl"></svg></div>
                    <div class="w-80 glass-card p-8 bg-slate-900/60 border-l-4 border-l-blue-600">
                        <h3 id="st-name" class="text-2xl font-black mb-1 text-white">Brasil</h3>
                        <div class="grid grid-cols-2 gap-4 mt-6">
                            <div class="p-4 bg-white/5 rounded-2xl text-center"><span class="text-[8px] text-slate-500 uppercase block">Alvos</span><div id="st-targets" class="text-xl font-black">---</div></div>
                            <div class="p-4 bg-white/5 rounded-2xl text-center"><span class="text-[8px] text-slate-500 uppercase block">Alertas</span><div id="st-hate" class="text-xl font-black text-amber-500">---</div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="src/core/app.js"></script>
    <script>
        // Fallback para Lucide Icons após carregamento modular
        window.addEventListener('load', () => { if(window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
