<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINELA v9 | Inteligência Situacional</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6;
            --accent-amber: #f59e0b;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item {
            display: flex; align-items: center; gap: 0.75rem; width: 100%;
            padding: 1rem 1.25rem; border-radius: 14px; font-weight: 600;
            font-size: 0.875rem; color: #94a3b8; transition: all 0.3s;
        }
        .nav-item.active { 
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15), transparent);
            color: #60a5fa;
            box-shadow: inset 2px 0 0 #3b82f6;
        }
        .state { fill: #1e293b; stroke: #334155; stroke-width: 0.8; transition: all 0.3s; cursor: pointer; }
        .state:hover { fill: #334155; stroke: #60a5fa; filter: drop-shadow(0 0 8px #3b82f6); }
        .state.high-aggro { fill: rgba(245, 158, 11, 0.4); stroke: var(--accent-amber); }
        .tag-bubble {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            color: #93c5fd;
            display: inline-block;
            margin: 4px;
            transition: all 0.2s;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="antialiased flex p-4 gap-4">

    <!-- SIDEBAR -->
    <aside class="w-72 glass-card flex flex-col p-8 shrink-0">
        <div class="flex items-center gap-3 mb-12">
            <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                <i data-lucide="shield-check" class="w-7 h-7 text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-900 tracking-tight leading-none">SENTINELA</h1>
                <span class="text-[10px] text-blue-400 font-bold tracking-[0.2em] uppercase">Intelligence v9</span>
            </div>
        </div>

        <nav class="flex-1 space-y-3">
            <button onclick="switchView('map')" id="nav-map" class="nav-item active">
                <i data-lucide="map" class="w-5 h-5"></i> Panorama Geopolítico
            </button>
            <button onclick="switchView('targets')" id="nav-targets" class="nav-item">
                <i data-lucide="activity" class="w-5 h-5"></i> Saúde dos Monitorados
            </button>
            <button onclick="switchView('trends')" id="nav-trends" class="nav-item">
                <i data-lucide="layers" class="w-5 h-5"></i> Nuvem de Temas
            </button>
        </nav>

        <div class="mt-auto pt-8 border-t border-white/5 space-y-4">
            <div class="p-4 bg-slate-900/40 rounded-2xl border border-white/5">
                <span class="text-[10px] font-bold text-slate-500 uppercase block mb-2">Sincronização</span>
                <div class="flex items-center justify-between">
                    <span class="text-xs font-mono text-emerald-400">STATUS: OK</span>
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                </div>
            </div>
            <button onclick="exportReport()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl text-xs font-bold transition-all flex items-center justify-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4"></i> Relatório Situacional
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col gap-4 min-w-0">
        
        <header class="grid grid-cols-4 gap-4 shrink-0">
            <div class="glass-card p-6">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Amostragem Total</span>
                <div id="kpi-total" class="text-3xl font-black font-mono text-slate-200">---</div>
            </div>
            <div class="glass-card p-6">
                <span class="text-[10px] font-bold text-amber-500 uppercase tracking-widest block mb-2">Índice Agressividade</span>
                <div id="kpi-aggro" class="text-3xl font-black font-mono text-amber-500">---</div>
            </div>
            <div class="glass-card p-6">
                <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest block mb-2">Estabilidade Digital</span>
                <div id="kpi-stability" class="text-3xl font-black font-mono text-blue-400">---</div>
            </div>
            <div class="glass-card p-6 flex items-center justify-between group cursor-pointer" onclick="refresh()">
                <div><span class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Próximo Ciclo</span><div class="text-sm font-bold">Atualizar</div></div>
                <div class="p-3 bg-white/5 rounded-xl group-hover:bg-white/10 transition-all"><i data-lucide="refresh-cw" class="w-5 h-5 text-slate-400"></i></div>
            </div>
        </header>

        <div class="flex-1 glass-card overflow-hidden relative">
            <div id="view-map" class="view-content absolute inset-0 p-10 flex flex-col">
                <div class="flex justify-between items-start mb-10">
                    <div><h2 class="text-2xl font-bold tracking-tight">Mapa de Calor Situacional</h2><p class="text-sm text-slate-400">Análise geopolítica em tempo real.</p></div>
                    <div class="flex bg-slate-900/80 p-1.5 rounded-2xl border border-white/10">
                        <button onclick="setMapMode('volume')" id="btn-mode-vol" class="px-6 py-2 text-[10px] font-bold rounded-xl bg-blue-600 text-white transition-all">VOLUME</button>
                        <button onclick="setMapMode('clima')" id="btn-mode-clima" class="px-6 py-2 text-[10px] font-bold rounded-xl text-slate-400 hover:text-white transition-all">CLIMA</button>
                    </div>
                </div>
                <div class="flex-1 flex items-center justify-center">
                    <svg viewBox="0 0 600 600" class="h-full w-auto drop-shadow-2xl">
                        <text x="50%" y="50%" text-anchor="middle" class="fill-slate-600 font-mono text-[10px] uppercase tracking-[0.5em]">Geometria do Mapa em Processamento...</text>
                    </svg>
                </div>
            </div>

            <div id="view-targets" class="view-content absolute inset-0 p-10 hidden overflow-y-auto">
                 <h2 class="text-2xl font-bold mb-8">Resiliência Digital dos Monitorados</h2>
                 <div id="target-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <div id="view-trends" class="view-content absolute inset-0 p-10 hidden flex flex-col">
                <h2 class="text-2xl font-bold mb-8">Nuvem de Temas e Narrativas</h2>
                <div class="flex-1 glass-card p-10 flex flex-wrap content-start gap-4" id="tag-cloud"></div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const SB_URL = "https://vhamejkldzxbeibqeqpk.supabase.co/rest/v1";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoYW1lamtsZHp4YmVpYnFlcXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgxMjUsImV4cCI6MjA5MjA2NDEyNX0.RMpgx8mDRrYRNfJ_GdOrsT5o8NkJiwBgW_J7CXSznWk";
        const h = { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` };

        async function refresh() {
            try {
                // KPIs
                const res = await fetch(`${SB_URL}/comentarios?select=id`, { headers: { ...h, "Prefer": "count=exact" } });
                const total = parseInt(res.headers.get("content-range")?.split("/")[1]) || 0;
                const resH = await fetch(`${SB_URL}/comentarios?is_hate=eq.true&select=id`, { headers: { ...h, "Prefer": "count=exact" } });
                const aggro = parseInt(resH.headers.get("content-range")?.split("/")[1]) || 0;
                
                document.getElementById('kpi-total').innerText = total.toLocaleString();
                document.getElementById('kpi-aggro').innerText = aggro;
                document.getElementById('kpi-stability').innerText = `${(100 - (aggro/total*100 || 0)).toFixed(1)}%`;

                // TARGETS - Usando colunas reais detectadas (username, cargo, estado)
                const resT = await fetch(`${SB_URL}/candidatos?select=username,cargo,estado&limit=15`, { headers: h });
                const targets = await resT.json();
                document.getElementById('target-grid').innerHTML = targets.map(t => `
                    <div class="glass-card p-6 bg-white/5 border-white/5">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center font-bold text-blue-400 text-xs">@</div>
                            <span class="text-[9px] px-2 py-1 rounded bg-blue-500/10 text-blue-400 border border-blue-500/10 font-bold uppercase">${t.estado || 'BR'}</span>
                        </div>
                        <h4 class="text-sm font-bold mb-1">@${t.username}</h4>
                        <p class="text-[10px] text-slate-500">${t.cargo || 'Monitorado'}</p>
                    </div>
                `).join('');

                // TRENDS
                const themes = ["Segurança", "Economia", "Corrupção", "Educação", "Nordeste", "Greve", "Impostos"];
                document.getElementById('tag-cloud').innerHTML = themes.map(t => `<div class="tag-bubble">${t}</div>`).join('');
            } catch(e) {
                console.error("Erro ao carregar dados:", e);
                document.body.innerHTML += `<div class="fixed inset-0 bg-red-900/20 backdrop-blur-md flex items-center justify-center z-50"><div class="glass-card p-10 text-center">
                    <h1 class="text-xl font-bold mb-2">Erro de Conexão Situacional</h1>
                    <p class="text-sm text-slate-400 mb-6">Não foi possível sincronizar com o banco de dados principal.</p>
                    <button onclick="location.reload()" class="px-6 py-2 bg-blue-600 rounded-lg font-bold text-xs">Tentar Reconectar</button>
                </div></div>`;
            }
        }

        function switchView(v) {
            document.querySelectorAll('.view-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${v}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
        }

        function setMapMode(m) {
            const vol = document.getElementById('btn-mode-vol');
            const clima = document.getElementById('btn-mode-clima');
            vol.className = m === 'volume' ? "px-6 py-2 text-[10px] font-bold rounded-xl bg-blue-600 text-white transition-all shadow-lg" : "px-6 py-2 text-[10px] font-bold rounded-xl text-slate-400 hover:text-white transition-all";
            clima.className = m === 'clima' ? "px-6 py-2 text-[10px] font-bold rounded-xl bg-amber-600 text-white transition-all shadow-lg" : "px-6 py-2 text-[10px] font-bold rounded-xl text-slate-400 hover:text-white transition-all";
        }

        async function exportReport() { window.location.href = '/api/export_pdf'; }
        window.onload = refresh;
    </script>
</body>
</html>
