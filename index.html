<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela Democrática - Hub Informativo</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXX" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #debug-console {
            width: 100%;
            max-height: 150px;
            background: #0f172a;
            color: #10b981;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            overflow-y: auto;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 11px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .ads-placeholder {
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 90px;
            width: 100%;
            margin-bottom: 24px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 p-4 md:p-10 font-sans min-h-screen">
    
    <div class="ads-placeholder rounded-2xl shadow-2xl">
        [ Espaço Reservado - Google AdSense 728x90 ]
        <ins class="adsbygoogle" style="display:none" data-ad-client="ca-pub-XXXXXXXXX" data-ad-slot="XXXXXX" data-ad-format="auto"></ins>
    </div>

    <header class="mb-12 flex justify-between items-end border-b border-white/5 pb-8">
        <div>
            <h1 class="text-4xl font-900 text-white tracking-tighter">Sentinela <span class="text-blue-500">Democrática</span></h1>
            <p class="text-slate-400 font-medium mt-1">Hub de Inteligência Situacional e Tendências de Opinião Pública</p>
        </div>
        <div class="text-right">
            <span class="text-[10px] font-bold text-emerald-400 font-mono tracking-widest uppercase bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">Live Sync Ativo</span>
        </div>
    </header>

    <div id="alerts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>

    <div class="glass-panel p-8 shadow-2xl mb-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-white tracking-tight">Análise Qualitativa de Engajamento</h2>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                <span class="text-[10px] font-bold text-slate-500 uppercase">Volume Global</span>
            </div>
        </div>
        <div class="relative h-[400px] w-full">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div id="debug-console" class="shadow-inner"></div>

    <script>
        const SUPABASE_URL = 'https://vhamejkldzxbeibqeqpk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoYW1lamtsZHp4YmVpYnFlcXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgxMjUsImV4cCI6MjA5MjA2NDEyNX0.RMpgx8mDRrYRNfJ_GdOrsT5o8NkJiwBgW_J7CXSznWk';

        function logDebug(msg, level = "INFO") {
            const consoleEl = document.getElementById('debug-console');
            const time = new Date().toLocaleTimeString();
            const logMsg = `[${time}] [${level}] ${msg}`;
            console.log(logMsg);
            
            const line = document.createElement('div');
            line.textContent = logMsg;
            line.className = "mb-1";
            if (level === "ERROR") line.style.color = "#ef4444";
            if (level === "WARN") line.style.color = "#f59e0b";
            
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function fetchSupabase(viewName) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${viewName}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status} ao acessar ${viewName}`);
            return await res.json();
        }

        async function initDashboard() {
            logDebug("Iniciando carregamento do hub informativo v2.0...");
            try {
                // 1. Carregar Alertas de Picos de Engajamento
                const alertas = await fetchSupabase('vw_picos_engajamento');
                const alertsContainer = document.getElementById('alerts-container');
                
                if (alertas.length > 0) {
                    alertas.forEach(alerta => {
                        alertsContainer.innerHTML += `
                            <div class="bg-amber-500/5 border border-amber-500/20 p-6 rounded-3xl transition-all hover:border-amber-500/40">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-8 h-8 bg-amber-500/20 rounded-xl flex items-center justify-center text-amber-500">
                                        <i data-lucide="zap" class="w-4 h-4"></i>
                                    </div>
                                    <h3 class="text-amber-500 text-xs font-black uppercase tracking-widest">Pico de Engajamento</h3>
                                </div>
                                <p class="text-lg font-black text-white">@${alerta.candidato_id}</p>
                                <p class="text-xs text-slate-400 mt-2">Volume detectado: <span class="text-slate-100 font-bold">${alerta.volume_mensagens} interações</span></p>
                            </div>
                        `;
                    });
                    logDebug(`Detectados ${alertas.length} alertas estratégicos.`);
                } else {
                    alertsContainer.innerHTML = '<div class="col-span-full p-10 glass-panel text-center text-slate-500 text-xs font-bold uppercase tracking-widest">Nenhum pico de agressividade detectado no ciclo atual</div>';
                }

                // 2. Carregar Termômetro de Hostilidade (Gráfico)
                const termometro = await fetchSupabase('vw_termometro_hostilidade');
                logDebug(`Dados de tendências: ${termometro.length} registros.`);
                
                const ctx = document.getElementById('trendChart').getContext('2d');
                
                const processed = termometro.reduce((acc, curr) => {
                    const label = curr.rotulo_ia?.split('] ')[1] || 'Neutro';
                    const idx = acc.labels.indexOf(label);
                    if(idx === -1) {
                        acc.labels.push(label);
                        acc.data.push(curr.volume_mensagens);
                    } else {
                        acc.data[idx] += curr.volume_mensagens;
                    }
                    return acc;
                }, {labels: [], data: []});

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: processed.labels,
                        datasets: [{
                            label: 'Interações por Categoria',
                            data: processed.data,
                            backgroundColor: 'rgba(59, 130, 246, 0.4)',
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                            borderRadius: 12
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { color: '#64748b', font: { weight: 'bold' } } },
                            x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { weight: 'bold' } } }
                        }
                    }
                });

                logDebug("Sincronização do Dashboard concluída.");
                lucide.createIcons();
            } catch (err) {
                logDebug(`Falha crítica: ${err.message}`, "ERROR");
                alertsContainer.innerHTML = `<div class="col-span-full p-20 glass-panel text-center text-red-500 font-bold uppercase tracking-widest">Erro de Sincronização: ${err.message}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDashboard();
            // Inicializar AdSense
            try {
                (adsbygoogle = window.adsbygoogle || []).push({});
            } catch (e) { logDebug("Erro AdSense: " + e.message, "WARN"); }
        });
        window.onerror = (msg, url, line) => { logDebug(`${msg} (L${line})`, "ERROR"); return false; };
    </script>
</body>
</html>
