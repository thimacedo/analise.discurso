<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINELA | Diamond Edition v20.2.0</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="/src/styles/main.css?v=20.2.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="custom-scrollbar">
    <!-- SIDEBAR ESQUERDA (Navegação Clean) -->
    <aside class="sidebar-left">
        <div class="brand-block">
            <div class="brand-mark"><img src="/logo_transparente.png" alt="Logo"></div>
            <h1>Sentinela</h1>
        </div>

        <nav class="side-nav">
            <a href="#monitor" class="nav-item active" id="nav-monitor"><i data-lucide="home" class="w-6 h-6"></i> <span>Início</span></a>
            <a href="#networks" class="nav-item" id="nav-networks"><i data-lucide="search" class="w-6 h-6"></i> <span>Explorar Redes</span></a>
            <a href="#directory" class="nav-item" id="nav-directory"><i data-lucide="users" class="w-6 h-6"></i> <span>Perfis</span></a>
            <a href="#dossie" class="nav-item" id="nav-dossie"><i data-lucide="file-text" class="w-6 h-6"></i> <span>Dossiês</span></a>
            <a href="#map" class="nav-item" id="nav-map"><i data-lucide="map" class="w-6 h-6"></i> <span>Mapa UF</span></a>
        </nav>

        <div class="sidebar-footer">
            <button type="button" class="sync-btn" onclick="window.forceRefresh()"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Sincronizar</button>
        </div>
    </aside>

    <!-- FEED CENTRAL (O Conteúdo Principal) -->
    <main class="main-feed-container custom-scrollbar">
        <header class="feed-header">
            <div class="filter-tabs">
                <button onclick="window.setDashboardFilter('all')" id="btn-filter-all" class="tab-btn active">Todos</button>
                <button onclick="window.setDashboardFilter('hate')" id="btn-filter-hate" class="tab-btn">Com Alertas</button>
                <button onclick="window.setDashboardFilter('critical')" id="btn-filter-critical" class="tab-btn">Crítico</button>
            </div>
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" placeholder="Buscar alvo ou estado..." oninput="window.setDashboardSearch(this.value)">
            </div>
        </header>

        <section id="view-monitor" class="view-content active-view">
            <div id="feed-alertas" class="social-feed">
                <!-- Os cards de post vão aqui -->
            </div>
            
            <!-- SENTINELA DA ROLAGEM INFINITA -->
            <div id="scroll-sentinel" style="height: 1px; width: 100%;"></div>
            
            <div id="loading-spinner" class="loading-state" style="display: none;">
                <div class="spinner"></div> Carregando mais...
            </div>
        </section>

        <section id="view-networks" class="view-content"></section>
        <section id="view-directory" class="view-content"></section>
        <section id="view-dossie" class="view-content"></section>
        <section id="view-map" class="view-content"></section>
    </main>

    <!-- SIDEBAR DIREITA (KPIs e Insights Fixos) -->
    <aside class="sidebar-right custom-scrollbar">
        <div class="profile-summary">
            <div class="brand-mark"><img src="/logo_transparente.png" alt="Logo"></div>
            <div>
                <h2>Sentinela Diamond</h2>
                <span class="stn-badge">● <span id="stn-balance">-- STN</span></span>
            </div>
        </div>

        <div class="kpi-grid-vertical">
            <div class="kpi-card">
                <span class="kpi-label">Monitorados</span>
                <div id="kpi-monitorados" class="kpi-value">---</div>
            </div>
            <div class="kpi-card kpi-card--danger">
                <span class="kpi-label">Alertas PASA</span>
                <div id="kpi-hate" class="kpi-value">---</div>
            </div>
            <div class="kpi-card">
                <span class="kpi-label">Amostragem</span>
                <div id="kpi-total" class="kpi-value">---</div>
            </div>
            <div class="kpi-card kpi-card--success">
                <span class="kpi-label">Resiliência</span>
                <div id="kpi-res" class="kpi-value">---</div>
            </div>
        </div>

        <div class="insight-card">
            <h3 class="insight-title">Análise de Risco</h3>
            <div id="chartMain" class="stack-list-clean"></div>
        </div>
    </aside>

    <script type="module" src="/src/core/app.js?v=20.2.0"></script>
    <script type="module" src="/src/core/payments.js?v=20.2.0"></script>
</body>
</html>
