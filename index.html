<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForenseNet v3.1 | Observatório de Discurso e Ódio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geist', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-link.active { border-bottom: 2px solid #e67e22; color: #e67e22; font-weight: 600; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 1); }
        .badge { padding: 2px 8px; border-radius: 6px; text-transform: uppercase; font-size: 10px; font-weight: bold; }
        .badge-hate { background: #fee2e2; color: #ef4444; }
        .badge-safe { background: #ecfdf5; color: #10b981; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 glass-card px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-slate-900 p-2 rounded-lg text-white"><i data-lucide="shield-check"></i></div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Forense<span class="text-orange-600">Net</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest leading-none">Linguística Forense Digital</p>
            </div>
        </div>

        <nav class="hidden md:flex gap-8">
            <button onclick="switchTab('tab-overview')" id="btn-overview" class="nav-link active text-sm py-1">Dashboard</button>
            <button onclick="switchTab('tab-comments')" id="btn-comments" class="nav-link text-sm py-1 text-slate-500 hover:text-orange-600">Comentários</button>
        </nav>

        <div class="flex items-center gap-4">
            <div id="sync-indicator" class="flex items-center gap-2 text-[10px] font-bold text-emerald-600 uppercase">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                Cloud Sync
            </div>
            <button onclick="refreshAll()" class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors"><i data-lucide="refresh-cw"></i></button>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-6 py-8">
        <section id="tab-overview" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="card glass-card p-6 rounded-2xl"><span class="text-[10px] text-slate-400 font-bold uppercase block mb-2">Total Monitorado</span><h3 id="kpi-total" class="text-3xl font-bold">0</h3></div>
                <div class="card glass-card p-6 rounded-2xl border-l-4 border-l-red-500"><span class="text-[10px] text-slate-400 font-bold uppercase block mb-2">Discursos de Ódio</span><h3 id="kpi-hate" class="text-3xl font-bold">0</h3></div>
                <div class="card glass-card p-6 rounded-2xl"><span class="text-[10px] text-slate-400 font-bold uppercase block mb-2">Perfis Ativos</span><h3 id="kpi-profiles" class="text-xl font-bold text-emerald-600">135</h3></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 card glass-card p-8 rounded-3xl h-80"><h4 class="font-bold mb-4">Volume de Coleta</h4><canvas id="timelineChart"></canvas></div>
                <div class="card glass-card p-8 rounded-3xl h-80"><h4 class="font-bold mb-4">Detecção de Ódio</h4><canvas id="categoryChart"></canvas></div>
            </div>
        </section>

        <section id="tab-comments" class="tab-content">
            <div class="card glass-card p-8 rounded-3xl overflow-hidden">
                <div class="flex justify-between mb-6">
                    <h4 class="text-xl font-bold">Repositório Cloud</h4>
                    <div class="flex gap-2">
                        <button onclick="loadComments(true)" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-100">VER ALERTAS</button>
                        <button onclick="loadComments()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-800">TODOS</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] uppercase font-bold text-slate-400">
                            <tr><th class="px-6 py-4">Data</th><th class="px-6 py-4">Autor</th><th class="px-6 py-4">Texto Periciado</th><th class="px-6 py-4">Status</th></tr>
                        </thead>
                        <tbody id="comments-table-body" class="divide-y divide-slate-100 text-xs"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        const SB_URL = "https://vhamejkldzxbeibqeqpk.supabase.co/rest/v1";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoYW1lamtsZHp4YmVpYnFlcXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0ODgxMjUsImV4cCI6MjA5MjA2NDEyNX0.RMpgx8mDRrYRNfJ_GdOrsT5o8NkJiwBgW_J7CXSznWk";
        let categoryChart = null;

        async function refreshAll() {
            await loadStats();
            await loadComments();
        }

        async function loadStats() {
            try {
                const respTotal = await fetch(`${SB_URL}/comentarios?select=count`, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Range-Unit": "items" } });
                const total = respTotal.headers.get("content-range")?.split("/")[1] || 0;
                
                const respHate = await fetch(`${SB_URL}/comentarios?is_hate=eq.true&select=count`, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
                const hate = respHate.headers.get("content-range")?.split("/")[1] || 0;

                document.getElementById('kpi-total').innerText = total;
                document.getElementById('kpi-hate').innerText = hate;
                renderCharts(total, hate);
            } catch(e) {}
        }

        async function loadComments(onlyAlerts = false) {
            try {
                let url = `${SB_URL}/comentarios?select=*&order=data_coleta.desc&limit=25`;
                if(onlyAlerts) url += "&is_hate=eq.true";

                const res = await fetch(url, { headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` } });
                const data = await res.json();

                document.getElementById('comments-table-body').innerHTML = data.map(c => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 text-[10px] text-slate-400">${new Date(c.data_coleta).toLocaleString()}</td>
                        <td class="px-6 py-4 font-bold text-slate-700">@${c.autor_username || 'anônimo'}</td>
                        <td class="px-6 py-4 max-w-md truncate" title="${c.texto_bruto}">${c.texto_bruto}</td>
                        <td class="px-6 py-4">
                            <span class="badge ${c.is_hate ? 'badge-hate' : 'badge-safe'}">
                                ${c.is_hate ? c.categoria_ia : 'Seguro'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch(e) {}
        }

        function renderCharts(total, hate) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if(categoryChart) categoryChart.destroy();
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ódio', 'Seguro'],
                    datasets: [{ data: [hate, total - hate], backgroundColor: ['#ef4444', '#e2e8f0'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active', 'text-orange-600'));
            const btnId = 'btn-' + tabId.split('-')[1];
            document.getElementById(btnId).classList.add('active', 'text-orange-600');
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
