<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Hostilidade Política - SENTINELA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #09090b; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .embed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }
        .brand img {
            height: 24px;
        }
        .brand span {
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .powered-by {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .map-container {
            flex-grow: 1;
            position: relative;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #svg-map-br {
            width: 100%;
            height: 100%;
            max-height: 500px;
        }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 12px;
            z-index: 10;
        }
        .tooltip strong {
            display: block;
            color: white;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .cta-footer {
            text-align: center;
            padding: 10px;
            background: #10b981;
        }
        .cta-footer a {
            color: black;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }
    </style>
</head>
<body>
    <header class="embed-header">
        <a href="https://sentinela-democratica-ruby.vercel.app/" target="_blank" class="brand">
            <img src="/sentinela_small.webp" alt="Sentinela" width="24" height="24">
            <span>SENTINELA</span>
        </a>
        <span class="powered-by">Live Data</span>
    </header>

    <div class="map-container">
        <div id="svg-map-br"></div>
        <div id="map-tooltip" class="tooltip"></div>
    </div>

    <footer class="cta-footer">
        <a href="https://sentinela-democratica-ruby.vercel.app/" target="_blank">Acessar Relatório Completo →</a>
    </footer>

    <script type="module">
        import { renderBrazilMap } from '/src/components/BrazilMap.js';
        
        async function initEmbed() {
            try {
                // Em produção, isso bateria na API real. Aqui pegamos a config atual.
                const API_BASE = '/api/v1'; 
                const response = await fetch(`${API_BASE}/geo/uf`);
                const geoData = await response.json();
                
                const ufStats = geoData.reduce((acc, item) => {
                    acc[item.uf] = { alvos: item.total_alvos, odio: item.total_hate, color: item.color };
                    return acc;
                }, {});

                const tooltip = document.getElementById('map-tooltip');
                
                renderBrazilMap('svg-map-br', ufStats, (name, data, ufId, event) => {
                    if (!data) return;
                    if (event && event.type === 'mouseenter') {
                        tooltip.style.opacity = '1';
                        tooltip.innerHTML = `
                            <strong>${name} (${ufId})</strong>
                            <div style="color: ${data.color || '#fff'}">${data.odio} alertas críticos</div>
                        `;
                    }
                });

                // Lógica simples de tooltip que não afeta o componente original
                document.getElementById('svg-map-br').addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.pageX + 15) + 'px';
                    tooltip.style.top = (e.pageY + 15) + 'px';
                });
                
                document.getElementById('svg-map-br').addEventListener('mouseout', () => {
                    tooltip.style.opacity = '0';
                });

            } catch (e) {
                console.error('Erro ao carregar mapa embed:', e);
            }
        }

        initEmbed();
    </script>
</body>
</html>
