?<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sentinela Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-2xl font-bold">Sentinela Dashboard</h1>
    <div id="error-log" class="text-red-500 font-mono my-4"></div>
    <div class="w-full max-w-2xl"><canvas id="myChart"></canvas></div>
    <script>
        async function load(){
            const url = "https://vhamejkldzxbeibqeqpk.supabase.co/rest/v1/dashboard_intel_agregada";
            const key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoYW1lamtsZHp4YmVpYnFlcXBrIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjQ4ODEyNSwiZXhwIjoyMDkyMDY0MTI1fQ.GfvAI7rV8isgdhVeJp4mOUscWpdOqOuBoURGm82VdtY";
            try {
                const res = await fetch(url, { headers: { "apikey": key, "Authorization": "Bearer " + key } });
                const data = await res.json();
                if (!res.ok) throw new Error("Erro API: " + res.status);
                new Chart(document.getElementById("myChart"), {
                    type: "bar",
                    data: {
                        labels: data.map(function(d) { return d.cenario || "Neutro"; }),
                        datasets: [{ label: "Coment·rios", data: data.map(function(d) { return d.total_comentarios; }), backgroundColor: "#3b82f6" }]
                    }
                });
            } catch(err) { document.getElementById("error-log").innerText = err.message; }
        }
        load();
    </script>
</body>
</html>
