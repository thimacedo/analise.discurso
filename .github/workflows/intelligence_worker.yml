name: Sentinela Intelligence Worker

on:
  schedule:
    - cron: '*/30 * * * *' # Roda a cada 30 minutos
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  process-backlog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Versao estavel para IA

      - name: Install Dependencies
        run: |
          pip install supabase pysentimiento python-dotenv
          # Nao instalamos torch/transformers explicitamente; o pysentimiento cuida disso

      - name: Run Intelligence Worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Rodar apenas 2 lotes por vez para caber no tempo do Action
          # O script original ja tem o loop, vamos rodar por 10 min e encerrar
          timeout 600s python backend/intelligence/classificador.py || true
