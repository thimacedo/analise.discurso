name: Atualizar Dados ForenseNet

on:
  schedule:
    - cron: '0 */12 * * *'   # a cada 12 horas
  workflow_dispatch:

jobs:
  coleta-e-atualizacao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download pt_core_news_sm

      - name: Run pipeline (Modo Anonimo)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COLETA_LIMITE_PERFIS: 5
          COLETA_POSTS_POR_PERFIL: 2
        run: python orquestrador.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/dados_latest.csv
          git commit -m "auto: atualiza dados $(date '+%Y-%m-%d %H:%M')" || echo "Sem alteracoes"
          git push
