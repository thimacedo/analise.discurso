name: Atualizar Dados ForenseNet

on:
  schedule:
    - cron: '0 */12 * * *'   # Roda a cada 12 horas (menos agressivo)
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub

jobs:
  coleta-e-atualizacao:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install -r requirements-full.txt
          python -m spacy download pt_core_news_sm

      - name: Executar pipeline (modo limitado)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          INSTAGRAM_SESSIONID: ${{ secrets.INSTAGRAM_SESSIONID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COLETA_LIMITE_PERFIS: 5
          COLETA_POSTS_POR_PERFIL: 2
        run: python orquestrador.py

      - name: Commit e push dos resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/dados_latest.csv visualizacoes/nuvem_*.png data/reports/*.pdf
          git commit -m "auto: atualização de dados e relatórios [skip ci]" || echo "Sem alterações"
          git push
