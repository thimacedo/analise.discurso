<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinela Watchdog Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-info { color: #60a5fa; }
        .log-warn { color: #facc15; }
        .log-error { color: #f87171; font-weight: bold; }
        .log-dim { color: #64748b; }
        .log-blue { color: #3b82f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-mono h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-white tracking-tight">🛡️ SENTINELA <span class="text-slate-500">WATCHDOG</span></h1>
            <div id="statusBadge" class="px-3 py-1 rounded-full text-xs font-bold border flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-current animate-pulse"></span>
                <span id="statusText">CONECTANDO...</span>
            </div>
        </div>
        <div class="text-sm text-slate-400">
            Tempo online: <span id="uptime" class="text-slate-200 font-bold">00:00:00</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex gap-4 p-4 overflow-hidden">
        
        <!-- Sidebar Metrics -->
        <aside class="w-64 flex flex-col gap-4 shrink-0">
            <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
                <h2 class="text-xs uppercase tracking-wider text-slate-500 font-bold mb-4">Métricas de Saúde</h2>
                
                <div class="space-y-4">
                    <div>
                        <div class="text-xs text-slate-400 mb-1">Reinícios Automáticos</div>
                        <div class="text-2xl font-bold text-white" id="val-restarts">0</div>
                    </div>
                    
                    <div>
                        <div class="text-xs text-slate-400 mb-1">Erros de Código (Fatais)</div>
                        <div class="text-2xl font-bold text-red-400" id="val-codeErrors">0</div>
                    </div>
                    
                    <div>
                        <div class="text-xs text-slate-400 mb-1">Alertas WhatsApp Enviados</div>
                        <div class="text-2xl font-bold text-yellow-400" id="val-alerts">0</div>
                    </div>
                    
                    <div class="pt-4 border-t border-slate-800">
                        <div class="text-xs text-slate-400 mb-2">Status da API Zyte</div>
                        <div id="val-zyte" class="text-sm font-bold px-2 py-1 rounded text-center">AGUARDANDO...</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Terminal / Logs -->
        <section class="flex-1 bg-slate-900 border border-slate-800 rounded-lg flex flex-col overflow-hidden shadow-2xl">
            <div class="bg-slate-950 border-b border-slate-800 p-2 px-4 flex gap-2 shrink-0">
                <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/50"></div>
                <span class="ml-4 text-xs text-slate-500">watchdog.log</span>
            </div>
            
            <div id="logTerminal" class="flex-1 overflow-y-auto p-4 text-sm font-mono custom-scrollbar">
                <div id="logContent" class="space-y-1">
                    <!-- Logs aparecerão aqui -->
                </div>
            </div>
        </section>
        
    </main>

    <script>
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function updateStatus(type, text) {
            const badge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');
            statusText.innerText = text;
            
            badge.className = 'px-3 py-1 rounded-full text-xs font-bold border flex items-center gap-2 ';
            
            if (type === 'online') {
                badge.className += 'bg-emerald-900/30 border-emerald-500/50 text-emerald-400';
            } else if (type === 'warning') {
                badge.className += 'bg-yellow-900/30 border-yellow-500/50 text-yellow-400';
            } else if (type === 'error') {
                badge.className += 'bg-red-900/30 border-red-500/50 text-red-400';
            }
        }

        function updateMetrics() {
            document.getElementById('val-restarts').innerText = state.restarts;
            document.getElementById('val-codeErrors').innerText = state.codeErrors;
            document.getElementById('val-alerts').innerText = state.alerts;
            
            const zyteEl = document.getElementById('val-zyte');
            if (state.zyteOk) {
                zyteEl.innerText = "ONLINE";
                zyteEl.className = "text-sm font-bold px-2 py-1 rounded text-center bg-emerald-900/20 text-emerald-400 border border-emerald-800";
            } else {
                zyteEl.innerText = "OFFLINE";
                zyteEl.className = "text-sm font-bold px-2 py-1 rounded text-center bg-red-900/20 text-red-400 border border-red-800";
            }
        }

        // Atualização do Uptime
        setInterval(() => {
            if(!state.startTime) return;
            const diff = Math.floor((Date.now() - state.startTime) / 1000);
            const h = String(Math.floor(diff / 3600)).padStart(2, '0');
            const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('uptime').innerText = `${h}:${m}:${s}`;
        }, 1000);

        // ===== STATE =====
        const state = {
            startTime: Date.now(),
            restarts: 0,
            codeErrors: 0,
            alerts: 0,
            zyteOk: true,
            logs: [],
            running: true,
        };

        // ===== CONEXÃO SSE (DADOS REAIS) =====
        const evtSource = new EventSource("/api/stream");
        
        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            // Mapeia os níveis do backend para as classes CSS do frontend
            const levelMap = { info: 'log-info', warn: 'log-warn', error: 'log-error', dim: 'log-dim', blue: 'log-blue' };
            const cssClass = levelMap[data.level] || 'log-dim';
            
            // Adiciona ao terminal de logs
            const line = document.createElement('div');
            line.className = cssClass;
            line.innerHTML = `<span class="log-dim">[${data.time}]</span> ${escapeHtml(data.message)}`;
            const logContent = document.getElementById('logContent');
            if(logContent) {
                logContent.appendChild(line);
                const terminal = document.getElementById('logTerminal');
                if(terminal) terminal.scrollTop = terminal.scrollHeight;
            }
        };

        // Atualiza métricas periodicamente do endpoint REST
        setInterval(async () => {
            try {
                const res = await fetch('/api/metrics');
                const metrics = await res.json();
                state.restarts = metrics.restarts;
                state.codeErrors = metrics.code_errors;
                state.alerts = metrics.alerts;
                state.zyteOk = metrics.zyte_ok;
                
                // Atualiza Status Badge
                if(metrics.status.includes("PARADO")) updateStatus('error', metrics.status);
                else if(metrics.status.includes("FALHOU")) updateStatus('warning', metrics.status);
                else updateStatus('online', metrics.status);

                updateMetrics();
            } catch(e) {}
        }, 2000);
        // ===== TABS =====
    </script>
</body>
</html>
