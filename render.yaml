services:
  - type: web
    name: sentinela-api
    region: ohio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn core.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SENTINELA_ADMIN_TOTP_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "*"

  - type: worker
    name: sentinela-collector
    region: ohio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m workers.worker_sentinela
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false

  - type: worker
    name: sentinela-pasa-processor
    region: ohio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m workers.pasa_processor
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
