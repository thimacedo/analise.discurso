services:
  # API WEB (FASTAPI)
  - type: web
    name: sentinela-api
    region: ohio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn core.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://vhamejkldzxbeibqeqpk.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: SENTINELA_SUPABASE_KEY
        sync: false

  # COLETOR (PYTHON)
  - type: worker
    name: sentinela-daily-worker
    region: ohio
    runtime: python
    buildCommand: pip install -r requirements.txt
    runCommand: python backend/collectors/worker_sentinela.py
    envVars:
      - key: SUPABASE_URL
        value: https://vhamejkldzxbeibqeqpk.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: IG_USERNAME
        value: monitoramento.discurso
      - key: IG_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # AVALIADOR PASA (NODE.JS)
  - type: worker
    name: sentinela-pasa-processor
    region: ohio
    runtime: node
    buildCommand: npm install
    runCommand: node backend/intelligence/pasa-worker.js
    envVars:
      - key: SUPABASE_URL
        value: https://vhamejkldzxbeibqeqpk.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
